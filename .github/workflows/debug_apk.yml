name: Debug Build APK
on: [workflow_dispatch]

jobs:
  libcore:
    name: Native Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: git submodule status library/core > libcore_status
      - uses: actions/cache@v4
        id: cache
        with:
          path: app/libs/libcore.aar
          key: ${{ hashFiles('.github/workflows/*', 'bin/lib/core/*', 'libcore_status') }}
      - id: version
        if: steps.cache.outputs.cache-hit != 'true'
        run: echo go_version=$(curl -s https://raw.githubusercontent.com/actions/go-versions/main/versions-manifest.json | grep -oE '"version": "[0-9]{1}.[0-9]{1,}(.[0-9]{1,})?"' | head -1 | cut -d':' -f2 | sed 's/ //g; s/"//g') >> $GITHUB_OUTPUT
      - uses: actions/setup-go@v5
        if: steps.cache.outputs.cache-hit != 'true'
        with: { go-version: '1.21' }
      - if: steps.cache.outputs.cache-hit != 'true'
        run: |
          echo "sdk.dir=${ANDROID_HOME}" > local.properties
          echo "ndk.dir=${ANDROID_HOME}/ndk/25.0.8775105" >> local.properties
          ./run lib core

  build:
    name: Gradle Build
    runs-on: ubuntu-latest
    needs: libcore
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: app/libs/libcore.aar
          key: ${{ hashFiles('.github/workflows/*', 'bin/lib/core/*', 'libcore_status') }}
      - name: Build APK
        env:
          BUILD_PLUGIN: none
        run: |
          rm -rf ~/.gradle
          mkdir -p ~/.gradle
          echo "org.gradle.daemon=false" > ~/.gradle/gradle.properties
          echo "sdk.dir=${ANDROID_HOME}" > local.properties
          echo "ndk.dir=${ANDROID_HOME}/ndk/25.0.8775105" >> local.properties
          ./run init action library
          ./gradlew app:assembleOssRelease
          APK=$(find app/build/outputs/apk -name '*arm64-v8a*.apk' | head -1)
          APK=$(dirname "$APK")
          echo "APK=$APK" >> $GITHUB_ENV
      - uses: actions/upload-artifact@v4
        with:
          name: APK
          path: ${{ env.APK }}
